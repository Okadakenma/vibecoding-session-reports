<!DOCTYPE html>
<html lang="ja">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIBECODING LAB 第2期 — セッションレポート</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Yu Gothic UI', sans-serif; background: #f4f7fb; color: #1a1a2e; }

  header {
    background: linear-gradient(135deg, #1a3a5c 0%, #2563a8 100%);
    color: white; padding: 28px 48px;
  }
  header .logo { font-size: 20px; font-weight: 700; letter-spacing: 2px; }

  .title-block { background: white; border-bottom: 1px solid #e0e7f0; padding: 28px 48px; }
  .title-block .label { font-size: 12px; color: #2563a8; font-weight: 700; letter-spacing: 2px; }
  .title-block h1 { font-size: 26px; font-weight: 700; margin: 6px 0 4px; color: #1a3a5c; }
  .title-block .date { font-size: 13px; color: #666; }

  main { max-width: 960px; margin: 0 auto; padding: 36px 24px; }

  .empty { text-align: center; padding: 64px 24px; color: #999; font-size: 14px; }

<body>

<header>
  <div class="logo">VIBECODING LAB</div>
</header>

<div class="title-block">
  <div class="label">COHORT 02</div>
  <h1>第2期</h1>
  <div class="date">2026年4月20日（月）〜 6月15日（月）</div>
</div>

<style>
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

  .card {
    background: white; border-radius: 10px; padding: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07); transition: all 0.2s;
    text-decoration: none; color: inherit; display: block;
    border-top: 3px solid #2563a8;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(37,99,168,0.15); }
  .card.pending { border-top-color: #cbd5e1; pointer-events: none; opacity: 0.6; }
  .card .session-no { font-size: 12px; font-weight: 700; color: #2563a8; letter-spacing: 1px; }
  .card.pending .session-no { color: #94a3b8; }
  .card .session-title { font-size: 15px; font-weight: 700; margin: 8px 0 6px; }
  .card .session-date { font-size: 12px; color: #666; }
  .card .topics { list-style: none; margin-top: 10px; }
  .card .topics li { font-size: 12px; color: #555; padding: 2px 0 2px 12px; position: relative; }
  .card .topics li::before { content: '·'; position: absolute; left: 0; color: #2563a8; font-weight: 700; }
  .card .badge {
    display: inline-block; margin-top: 14px; font-size: 11px; font-weight: 600;
    background: #e8f0fd; color: #2563a8; padding: 3px 10px; border-radius: 20px;
  }
  .card.pending .badge { background: #f1f5f9; color: #94a3b8; }
</style>
<main>
  <div class="grid">
    <a href="2026-04-20-第2期第1回.html" class="card">
      <div class="session-no">SESSION 01</div>
      <div class="session-title">VIBECODINGとは・環境構築・GitHub連携</div>
      <div class="session-date">2026年4月20日（月）</div>
      <ul class="topics">
        <li>VIBECODINGとは</li>
        <li>WEBアプリの3層構造の理解</li>
        <li>Claude Code 環境設定</li>
        <li>GitHub連携</li>
        <li>ToDoアプリ フロントエンドの実装</li>
      </ul>
      <div class="badge">✅ 公開済み</div>
    </a>
  </div>
</main>

<footer>VIBECODING LAB &copy; 2026 岡田雄太</footer>
