<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIBECODING LAB — セッションレポート一覧</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Yu Gothic UI', sans-serif; background: #f4f7fb; color: #1a1a2e; }

  header {
    background: linear-gradient(135deg, #1a3a5c 0%, #2563a8 100%);
    color: white; padding: 36px 48px;
  }
  header .logo { font-size: 22px; font-weight: 700; letter-spacing: 2px; }
  header .subtitle { font-size: 13px; opacity: 0.75; margin-top: 4px; letter-spacing: 1px; }

  main { max-width: 960px; margin: 0 auto; padding: 40px 24px; }

  .period-label {
    font-size: 13px; font-weight: 700; color: #2563a8;
    letter-spacing: 2px; margin-bottom: 16px; margin-top: 36px;
    padding-left: 12px; border-left: 3px solid #2563a8;
  }
  .period-label:first-child { margin-top: 0; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

  .period-card {
    background: white; border-radius: 10px; padding: 28px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07); transition: all 0.2s;
    text-decoration: none; color: inherit; display: block;
    border-top: 3px solid #2563a8;
  }
  .period-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(37,99,168,0.15); }
  .period-card .period-no { font-size: 12px; font-weight: 700; color: #2563a8; letter-spacing: 1px; }
  .period-card .period-title { font-size: 20px; font-weight: 700; margin: 8px 0 6px; color: #1a3a5c; }
  .period-card .period-date { font-size: 12px; color: #666; margin-bottom: 12px; }
  .period-card .period-count { font-size: 13px; color: #333; }
  .period-card .badge {
    display: inline-block; margin-top: 16px; font-size: 11px; font-weight: 600;
    background: #e8f0fd; color: #2563a8; padding: 3px 10px; border-radius: 20px;
  }
  .period-card.upcoming { border-top-color: #ccc; opacity: 0.55; cursor: default; }
  .period-card.upcoming:hover { transform: none; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .period-card.upcoming .period-no { color: #999; }

  footer { text-align: center; padding: 48px 24px; font-size: 12px; color: #999; }
</style>
</head>
<body>

<header>
  <div class="logo">VIBECODING LAB</div>
  <div class="subtitle">SESSION REPORTS</div>
</header>

<main>
  <div class="period-label">期を選択してください</div>
  <div class="grid">
    <a href="cohort1-d3ce6710/index.html" class="period-card">
      <div class="period-no">COHORT 01</div>
      <div class="period-title">第1期</div>
      <div class="period-date">2026年4月1日 〜 6月4日</div>
      <div class="period-count">全8回 ｜ 公開済み 1回</div>
      <div class="badge">✅ 開講中</div>
    </a>
    <a href="cohort2-90e32029/index.html" class="period-card">
      <div class="period-no">COHORT 02</div>
      <div class="period-title">第2期</div>
      <div class="period-date">2026年4月20日 〜 6月15日</div>
      <div class="period-count">全8回</div>
      <div class="badge">準備中</div>
    </a>
    <a href="第3期/index.html" class="period-card upcoming">
      <div class="period-no">COHORT 03</div>
      <div class="period-title">第3期</div>
      <div class="period-date">2026年6月18日 〜 8月5日</div>
      <div class="period-count">全8回</div>
      <div class="badge">近日開講</div>
    </a>
  </div>
</main>

<footer>VIBECODING LAB &copy; 2026 岡田雄太</footer>
</body>
</html>
